name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Isar schemas
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --coverage

  build:
    name: Build APK Release (PROD)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Isar schemas
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK Release (PROD flavor)
        run: flutter build apk --release --dart-define=ENV_NAME=PROD

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigiNews-PROD-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
